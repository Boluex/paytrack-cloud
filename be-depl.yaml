apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: paytrack-be
  name: paytrack-be
  namespace: paytrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: paytrack-be
  
  template:
    metadata:
      labels:
        app: paytrack-be
    spec:
      containers:
      - image: boluex/paytrack-backend:7.0
        name: paytrack-backend
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: paytrack-config  
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: SECRET_KEY
              name: paytrack-secret
        
          
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources: 
          requests:
            memory: "128Mi"
            cpu: "500m"
          limits:
            memory: "512Mi"
          cpu: "1000m"

